<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDR Assistant - SOP Central</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="chatgpt-container">
        <div class="sidebar">
            <div class="logo-area">
                <div class="ndr-logo">N</div>
                <h2>NDR Assistant</h2>
            </div>
            
            <div class="menu-items">
                <p style="color: #8e8ea0; font-size: 0.75rem; padding-bottom: 10px; font-weight: bold;">AKSES CEPAT SOP</p>
                <button class="ndr-quick-start">Jam Kerja?</button>
                <button class="ndr-quick-start">Aturan Cuti?</button>
                <button class="ndr-quick-start">Alur Lembur?</button>
                <button class="ndr-quick-start">Lokasi Kantor?</button>
            </div>
            
            <div class="user-area">
                <p>HRD Portal - NDR</p>
            </div>
        </div>

        <div class="main-chat">
            <div id="bp-webchat-container"></div>
        </div>
    </div>


    <script>
      document.addEventListener('DOMContentLoaded', () => {
        // Cari semua tombol di sidebar
        const quickStartButtons = document.querySelectorAll('.ndr-quick-start');
        
        quickStartButtons.forEach(button => {
          button.addEventListener('click', (event) => {
            const questionToAsk = event.target.innerText;
            
            // Perintah ini bakal maksa bot ngetik pertanyaan dari tombol
            window.botpressWebChat.sendPayload({
              type: 'text',
              text: questionToAsk
            });
          });
        });
      });
    </script>
</body>
</html>
