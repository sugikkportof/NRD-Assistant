<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NDR Assistant - SOP Central</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="chatgpt-container">
        
        <div class="sidebar">
            <div class="logo-area">
                <div class="ndr-logo">N</div>
                <h2>NDR Assistant</h2>
            </div>
            
            <div class="menu-items">
                <button class="active">SOP Utama</button>
                <button>Alur Kerja</button>
                <button>Kebijakan Cuti</button>
            </div>
            
            <div class="user-area">
                <p>HRD Portal</p>
            </div>
        </div>

        <div class="main-chat">
            
            <div class="welcome-section" id="welcomeScreen">
                <div class="central-ndr-logo">N</div>
                <h1>SOP Assistant</h1>
                <p>Silakan tanyakan tentang kebijakan PT Nusantara Digital Raya</p>
            </div>
            
            <div id="bp-webchat-container" style="width: 100%; height: 100%; max-width: 800px; z-index: 10;"></div>
        </div>

    </div>

    <script src="https://cdn.botpress.cloud/webchat/v3.6/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/03/17/14/20260317145503-3WPLI5X6.js" defer></script>
